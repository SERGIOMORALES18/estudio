<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Iniciar Sesión — Velvet Club</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Bebas+Neue&family=Great+Vibes&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/login-styles.css">
  </head>
  <body class="login-page">
    <header class="site-header">
      <div class="logo"><span class="brand"><span class="velvet">Velvet</span> <span class="club">Club</span></span></div>
      <nav class="top-nav">
        <a href="index.html">Volver a Perfiles</a>
      </nav>
    </header>

    <main class="login-main">
      <div class="login-container">
        <div class="login-header">
          <h1>Administración</h1>
          <p class="subtitle">Panel exclusivo para administradores</p>
        </div>

        <div class="error-message" id="error-msg"></div>

        <form id="login-form">
          <div class="form-group">
            <label for="username">Usuario</label>
            <input 
              type="text" 
              id="username" 
              placeholder="Ingresa tu usuario"
              required
              autocomplete="username"
            />
          </div>

          <div class="form-group">
            <label for="password">Contraseña</label>
            <input 
              type="password" 
              id="password" 
              placeholder="Ingresa tu contraseña"
              required
              autocomplete="current-password"
            />
          </div>

          <button type="submit" class="login-btn">Iniciar Sesión</button>
        </form>

        <div class="back-link">
          <a href="index.html">← Volver a la página principal</a>
        </div>
      </div>
    </main>

    <script src="js/login.js"></script>
  </body>
</html>
